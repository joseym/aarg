[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# The generated formula lands in this repo; publishing needs a
# HOMEBREW_TAP_TOKEN secret with write access to it.
tap = "joseym/homebrew-tap"
# dist's built-in local build gives us no place to sign the macOS binaries
# between compiling and archiving, and its `macos-sign` support in 0.32 lacks
# a timestamp, hardened runtime, and notarization. So we turn off the built-in
# local build and take it over with build-artifacts.yml, which signs and
# notarizes the two mac binaries before dist archives them. The switch is
# all-or-nothing, so the custom job builds the linux target too.
build-local-artifacts = false
local-artifacts-jobs = ["./build-artifacts"]
# Custom publish-phase job: pushes aarg-core, aarg-domain, and aarg to
# crates.io in dependency order. Points at .github/workflows/publish-crates.yml.
publish-jobs = ["homebrew", "./publish-crates"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# PRs validate the release config only. For a full dress rehearsal on a PR
# (all targets built, mac signing and notarization included), set this to
# "upload" for that branch and flip it back before merge.
pr-run-mode = "plan"
# The frontend (compiled wasm + Angular build) has to exist before cargo build,
# because build.rs embeds web/dist into the binary. dist's github-build-setup
# only injects into its built-in local build job, which build-artifacts.yml now
# replaces, so those steps live inline in build-artifacts.yml (and, for the
# crates.io verify build, in publish-crates.yml).

# Only the `aarg` CLI ships; the `evals` bin in this package is a dev harness.
[dist.binaries]
aarch64-apple-darwin = ["aarg"]
x86_64-apple-darwin = ["aarg"]
x86_64-unknown-linux-gnu = ["aarg"]

# brew is the one channel that can install typst for the user; the formula
# declares it so rendering works out of the box.
[dist.dependencies.homebrew]
typst = { stage = ["run"] }
