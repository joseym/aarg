[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# PRs validate the release config without building; the full pipeline was
# rehearsed in upload mode on the distribution PR (all three targets green).
pr-run-mode = "plan"
# Extra CI steps injected before the build: they compile the wasm bundle and
# the Angular frontend so build.rs can embed web/dist into the binary. Kept in
# .github/ (not .github/workflows/) because dist resolves this path relative to
# the generated workflow file under .github/workflows/.
github-build-setup = "../build-setup.yml"

# Only the `aarg` CLI ships; the `evals` bin in this package is a dev harness.
[dist.binaries]
aarch64-apple-darwin = ["aarg"]
x86_64-apple-darwin = ["aarg"]
x86_64-unknown-linux-gnu = ["aarg"]
