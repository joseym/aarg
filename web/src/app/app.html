<app-topbar (toggleNav)="navOpen.set(!navOpen())" />

<div
  class="shell"
  [class.nav-open]="navOpen()"
  [class.collapsed]="collapsed()"
  [class.chat-open]="chatOpen()"
  [class.chat-resizing]="chatResizing()"
  [style.--chat-w.px]="chatOpen() ? chatWidth() : 0"
>
  <div class="nav-scrim" (click)="navOpen.set(false)"></div>
  <div class="chat-scrim" (click)="toggleChat()"></div>
  <app-sidebar
    [open]="navOpen()"
    [collapsed]="collapsed()"
    [chatOpen]="chatOpen()"
    (closeNav)="navOpen.set(false)"
    (toggleCollapse)="toggleCollapsed()"
    (toggleChat)="toggleChat()"
  />
  <app-chat-panel
    [open]="chatOpen()"
    [width]="chatWidth()"
    (close)="toggleChat()"
    (widthChange)="onChatWidth($event)"
    (widthCommit)="onChatWidthCommit($event)"
  />
  <main class="main">
    <router-outlet />
  </main>
</div>

<app-copilot-overlay />
