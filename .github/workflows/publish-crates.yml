# Custom publish job for dist: pushes the three publishable crates to
# crates.io in dependency order. dist calls this in the publish phase (after
# artifacts are built and only on a real release tag, never on PRs), passing
# the plan JSON and inheriting the repository secrets. Wired in via
# `publish-jobs = ["./publish-crates"]` in dist-workspace.toml; do not hand-edit
# the invocation in release.yml, regenerate with `dist generate` instead.
name: Publish crates

on:
  workflow_call:
    # dist hands every custom job the plan document. We do not read it here, but
    # the input has to be declared or the generated `with: { plan: ... }` call
    # fails.
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-crates:
    runs-on: ubuntu-22.04
    env:
      # dist calls this reusable workflow with `secrets: inherit`, so the token
      # set once in the repo's Actions secrets reaches us here. cargo also reads
      # CARGO_REGISTRY_TOKEN from the environment on its own.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable

      # --- Build the frontend the `aarg` package embeds -------------------
      # The published `aarg` crate carries web/dist/aarg/browser (via the
      # `include` list in Cargo.toml), and build.rs embeds it at compile time,
      # so the verify build cargo runs during `cargo publish -p aarg` needs it
      # present. These steps mirror .github/build-setup.yml exactly.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - name: Build wasm bundle and frontend
        run: |
          wasm-pack build crates/aarg-wasm --target web --out-dir ../../web/src/wasm/pkg --out-name aarg_wasm
          cd web && npm ci && npm run build
          cd ..
          test -f web/dist/aarg/browser/index.html

      # --- Publish in dependency order ------------------------------------
      - name: Publish to crates.io
        shell: bash
        run: |
          set -o pipefail

          # Publish one crate, tolerating the two situations a release can hit:
          #   1. The crate is already on crates.io at this version. That happens
          #      when a release is re-run after a partial failure. cargo exits
          #      non-zero, but there is nothing left to do, so treat it as done.
          #   2. A just-published dependency has not propagated to the sparse
          #      index yet, so cargo cannot resolve it. That is transient; back
          #      off and retry a bounded number of times.
          publish() {
            local crate=$1 attempt=1 max=10 out rc
            while :; do
              set +e
              out=$(cargo publish -p "$crate" 2>&1)
              rc=$?
              set -e
              printf '%s\n' "$out"

              if [ "$rc" -eq 0 ]; then
                echo "published $crate"
                return 0
              fi

              # Case 1: already on the registry at this version.
              if printf '%s' "$out" | grep -qiE 'already (exists|uploaded)|is already uploaded'; then
                echo "$crate is already on crates.io at this version; continuing"
                return 0
              fi

              # Case 2: a dependency is not in the index yet.
              if printf '%s' "$out" | grep -qiE 'no matching package|failed to select a version|not found in( the)? registry'; then
                if [ "$attempt" -ge "$max" ]; then
                  echo "index did not propagate a dependency of $crate after $max attempts" >&2
                  return 1
                fi
                echo "index not ready for a dependency of $crate; retry $attempt/$max in 30s"
                attempt=$((attempt + 1))
                sleep 30
                continue
              fi

              echo "publishing $crate failed for a non-transient reason" >&2
              return 1
            done
          }

          publish aarg-core
          publish aarg-domain
          publish aarg
